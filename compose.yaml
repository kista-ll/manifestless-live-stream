services:
  server:
    build:
      context: ./apps/server
    env_file:
      - .env.example
    ports:
      - "4433:4433/udp"
      - "4433:4433/tcp"
      - "9000:9000/udp"
    volumes:
      - ./media/live:/media/live
      - ./certs:/certs:ro

  viewer:
    build:
      context: ./apps/viewer
    environment:
      VITE_STREAM_ID: live-001
      VITE_WEBTRANSPORT_URL: https://localhost:4433/webtransport/live-001
    ports:
      - "5173:5173"
    depends_on:
      - server
